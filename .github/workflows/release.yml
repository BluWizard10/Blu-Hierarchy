name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

env:
  packageName: "net.bluwizard.hierarchy"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: get version
        id: version
        uses: notiz-dev/github-action-json-property@7c8cf5cc36eb85d8d287a8086a39dac59628eb31
        with:
          path: "package.json"
          prop_path: "version"

      - name: Verify tag matches package.json version
        if: github.ref_type == 'tag'
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ steps.version.outputs.prop }}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Pushed tag '$TAG' does not match package.json version '$VERSION'."
            echo "::error::Bump package.json first, commit, then tag."
            exit 1
          fi
          echo "Tag and package.json version match: $VERSION"

      - name: Set Environment Variables
        run: |
          echo "zipFile=${{ env.packageName }}-${{ steps.version.outputs.prop }}".zip >> $GITHUB_ENV
          echo "unityPackage=${{ env.packageName }}-${{ steps.version.outputs.prop }}.unitypackage" >> $GITHUB_ENV

      - run: find . -name "*.meta" >> .metaList

      - name: Create UnityPackage
        uses: pCYSl5EDgo/create-unitypackage@cfcd3cf0391a5ef1306342794866a9897c32af0b
        with:
          package-path: ${{ env.unityPackage }}
          include-files: .metaList

      - name: Create Zip
        shell: bash
        run: |
          zip -r "${{ env.zipFile }}" . \
            -x "${{ env.unityPackage }}" "${{ env.zipFile }}" \
              -x  ".git/*" ".git" "*/.github/*" \
                  ".github/*" ".github" "*/.github/*" \
                  ".gitignore" ".gitattributes" ".gitmodules"

      - name: Make Release
        uses: softprops/action-gh-release@1e07f4398721186383de40550babbdf2b84acfc5
        with:
          tag_name: ${{ steps.version.outputs.prop }}
          files: |
            ${{ env.zipFile }}
            ${{ env.unityPackage }}
            package.json

      - name: Trigger VPM Listing Rebuild
        env:
          GH_TOKEN: ${{ secrets.VPM_DISPATCH_TOKEN }}
        run: |
          gh workflow run build-listing.yml \
            --repo BluWizard10/VPM \
            --ref main
